<div appHighlight class="course-card">

    <h3>{{ courseName }}</h3>

    <p>Status: {{ gradeStatus }}</p>

    <p>Credits: {{ credits | creditLabel }}</p>

    <button (click)="toggleDetails()">
        {{ isExpanded ? 'Hide Details' : 'Show Details' }}
    </button>

    <button (click)="toggleEnrollment()">

        {{ enrollmentService.isEnrolled(courseId)
            ? 'Unenroll'
            : 'Enroll' }}

    </button>

</div>
