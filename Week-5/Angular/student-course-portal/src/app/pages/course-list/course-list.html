<p *ngIf="isLoading">
    Loading courses...
</p>

<div *ngIf="!isLoading">

    <app-course-card *ngFor="let course of courses; trackBy: trackByCourseId" [courseName]="course.name" [gradeStatus]="course.gradeStatus" [credits]="course.credits">
    </app-course-card>

</div>

<ng-template #noCourses>
    <p>No courses available.</p>
</ng-template>
