<div *ngIf="loading$ | async">
    Loading courses...
</div>

<div *ngIf="error$ | async as error">
    {{ error }}
</div>

<div *ngIf="courses$ | async as courses">
    <div *ngFor="let course of courses">
        <h3>{{ course.name }}</h3>
        <p>Course Code: {{ course.code }}</p>
        <p>Credits: {{ course.credits }}</p>
        <p>Status: {{ course.gradeStatus }}</p>
    </div>
</div>
