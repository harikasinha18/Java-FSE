<h1>{{ portalName }}</h1>

<p>
  Welcome to the Student Course Portal.
  Search and enroll in your favorite courses.
</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<label>Search Course:</label>
<br><br>

<input
  type="text"
  placeholder="Enter course name"
  [(ngModel)]="searchTerm">

<p><strong>Searching for:</strong> {{ searchTerm }}</p>

<!--
[property] is one-way binding (Component → DOM)

[(ngModel)] is two-way binding (Component ↔ DOM)
-->
